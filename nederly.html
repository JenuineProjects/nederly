<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FAF3E0" />
  <title>Nederly</title>
  <style>
    @font-face {
      font-family: 'OpenDyslexic';
      src: url('OpenDyslexic-Regular.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #FAF3E0;
      font-family: 'OpenDyslexic', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-text-size-adjust: 100%;
      color: #1A1A1A;
      line-height: 1.6;
      letter-spacing: 0.04em;
    }
    button { cursor: pointer; font-family: inherit; }
    textarea { font-family: inherit; }
    #app { max-width: 600px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }

    /* Header */
    .header {
      display: flex; align-items: center; padding: 12px 20px;
      border-bottom: 1px solid #E0D8C8; background: #FAF3E0;
      position: sticky; top: 0; z-index: 10;
    }
    .header h1 { font-size: 20px; font-weight: 600; color: #1A1A1A; }
    .back-btn {
      background: none; border: none; color: #2E6DA4;
      font-size: 22px; padding: 4px 12px 4px 0; cursor: pointer;
    }

    /* Screens */
    .screen { flex: 1; padding: 24px 40px; display: flex; flex-direction: column; gap: 16px; }

    /* Nav / Category buttons */
    .nav-btn {
      background: #FAF3E0; border: 1px solid #E0D8C8; border-radius: 8px;
      padding: 16px 24px; min-height: 64px; text-align: left;
      font-size: 18px; color: #1A1A1A; width: 100%;
      transition: background 0.1s;
    }
    .nav-btn:hover { background: #F0E8D0; }

    /* Progress link */
    .text-btn {
      background: none; border: none; color: #2E6DA4;
      font-size: 18px; text-align: left; padding: 4px 0;
      min-height: 48px; cursor: pointer;
    }

    /* Progress dots */
    .dots { display: flex; gap: 6px; flex-wrap: wrap; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #E0D8C8; flex-shrink: 0;
    }
    .dot.done { background: #3A7D44; }
    .dot.active { background: #2E6DA4; }

    /* Category progress bar — Per Dyslexia Expert §11.1 */
    .progress-row {
      display: flex; align-items: center; gap: 8px;
      margin-top: 0; margin-bottom: 8px;
    }
    .progress-track {
      flex: 1;
      height: 6px;
      background: #E8DFC4;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #2E6DA4;
      border-radius: 3px;
      transition: width 300ms ease-out;
    }
    .progress-label {
      font-size: 16px;
      color: #6B6B6B;
      flex-shrink: 0;
    }

    /* Flashcard */
    .card {
      background: #FAF3E0; border: 2px solid #E0D8C8; border-radius: 12px;
      padding: 24px; min-height: 200px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      cursor: pointer; user-select: none; transition: border-color 0.15s;
    }
    .card.revealed { border-color: #2E6DA4; cursor: default; }
    .card-word { font-size: 26px; line-height: 40px; text-align: center; }
    .card-ipa { font-size: 16px; color: #6B6B6B; }
    .card-english { font-size: 18px; color: #1A1A1A; }
    .card-tap { font-size: 16px; color: #6B6B6B; }
    .play-row { display: flex; gap: 8px; }

    /* Play button */
    .play-btn {
      background: #2E6DA4; color: white; border: none; border-radius: 8px;
      padding: 8px 16px; font-size: 18px; cursor: pointer; min-height: 48px;
    }
    .play-btn.slow { background: #6B4FA0; }

    /* Hint */
    .hint {
      border-left: 3px solid #6B4FA0; padding: 4px 0 4px 8px;
      font-size: 16px; color: #6B4FA0; line-height: 29px;
    }

    /* Outcome buttons */
    .outcome-row { display: flex; gap: 16px; }
    .missed-btn {
      flex: 1; min-height: 48px; border: 1px solid #D94F3D;
      border-radius: 8px; background: #FAF3E0; color: #1A1A1A;
      font-size: 18px; cursor: pointer;
    }
    .got-btn {
      flex: 1; min-height: 48px; border: none;
      border-radius: 8px; background: #3A7D44; color: #FAF3E0;
      font-size: 18px; cursor: pointer;
    }

    /* Session complete */
    .complete-screen {
      min-height: 100dvh; background: #FAF3E0;
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 40px 40px; gap: 24px;
    }
    .pct { font-size: 64px; color: #2E6DA4; line-height: 76px; }
    .pct-label { font-size: 18px; color: #6B6B6B; }
    .outcome-row-item {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 0; width: 100%;
    }
    .home-btn {
      margin-top: 24px; background: #2E6DA4; color: #FAF3E0;
      border: none; border-radius: 8px; min-height: 64px;
      width: 100%; font-size: 18px; cursor: pointer;
    }

    /* Textarea */
    .paste-area {
      border: 1px solid #E0D8C8; border-radius: 8px;
      padding: 16px; font-size: 18px; color: #1A1A1A;
      background: #FAF3E0; resize: vertical; width: 100%;
      outline: none; line-height: 29px;
    }
    .word-count { font-size: 16px; color: #6B6B6B; }

    /* Radio */
    .radio-btn {
      display: flex; align-items: center; gap: 8px;
      background: none; border: none; padding: 4px 0;
      min-height: 48px; cursor: pointer; font-size: 18px; color: #1A1A1A;
    }
    .radio-circle {
      width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid #E0D8C8; display: inline-block;
    }
    .radio-circle.selected { border-color: #2E6DA4; background: #2E6DA4; }

    /* Start button */
    .start-btn {
      background: #2E6DA4; color: #FAF3E0; border: none; border-radius: 8px;
      min-height: 64px; font-size: 18px; cursor: pointer; margin-top: 24px; width: 100%;
    }
    .start-btn:disabled { background: #A0A0A0; cursor: not-allowed; }

    /* Minimal pairs */
    .pair-row { display: flex; gap: 16px; }
    .pair-card {
      flex: 1; min-height: 96px; border: 2px solid #E0D8C8; border-radius: 12px;
      background: #FAF3E0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 16px; gap: 8px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .pair-card.correct { border-color: #3A7D44; background: #F0FBF1; }
    .pair-card.incorrect { border-color: #D94F3D; background: #FDF0EF; }
    .pair-word-a { font-size: 26px; color: #E07B39; text-align: center; }
    .pair-word-b { font-size: 26px; color: #2E6DA4; text-align: center; }
    .pair-english { font-size: 16px; color: #1A1A1A; text-align: center; }
    .focus-label { font-size: 16px; color: #6B4FA0; }

    /* Stats */
    .stats-row { display: flex; gap: 16px; }
    .stat-box {
      flex: 1; border: 1px solid #E0D8C8; border-radius: 8px;
      padding: 16px; display: flex; flex-direction: column;
      align-items: center; gap: 4px;
    }
    .stat-num { font-size: 36px; color: #2E6DA4; line-height: 44px; }
    .stat-label { font-size: 16px; color: #6B6B6B; text-align: center; }
    .section-label {
      font-size: 16px; color: #6B6B6B;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .session-row {
      display: flex; align-items: center; padding: 8px 0;
      border-bottom: 1px solid #E0D8C8;
    }
    .session-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .session-date { font-size: 18px; color: #1A1A1A; }
    .session-type { font-size: 16px; color: #6B6B6B; }
    .session-count { font-size: 18px; color: #2E6DA4; }
    .empty-msg { font-size: 18px; color: #6B6B6B; text-align: center; margin-top: 40px; }

    /* Sounds screen */
    .sound-section-heading {
      font-size: 14px; font-weight: 600; color: #6B6B6B;
      text-transform: uppercase; letter-spacing: 1px;
      margin-top: 8px;
    }
    .sound-card {
      border: 1px solid #E0D8C8; border-radius: 10px;
      padding: 14px 16px; display: flex; flex-direction: column; gap: 6px;
      background: #FAF3E0;
    }
    .sound-card-top { display: flex; align-items: center; gap: 10px; }
    .sound-spelling { font-size: 24px; font-weight: 600; line-height: 1.2; }
    .sound-star { font-size: 16px; color: #E07B39; }
    .sound-desc {
      font-size: 16px; color: #1A1A1A; line-height: 26px;
    }
    .sound-desc.clamped {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .sound-toggle {
      background: none; border: none; padding: 4px 0;
      color: #2E6DA4; font-size: 16px; cursor: pointer;
      min-height: 36px; text-align: left; font-family: inherit;
      letter-spacing: 0.04em;
    }
    .sound-example-row { display: flex; align-items: center; gap: 10px; margin-top: 2px; }
    .sound-example-word { font-size: 20px; }
    .sound-example-english { font-size: 15px; color: #6B6B6B; }
    .sound-example-pronounce {
      font-size: 16px; color: #1A1A1A; margin-top: 4px;
      padding: 6px 10px; background: #F0E8D0; border-radius: 6px;
      display: inline-block; align-self: flex-start;
    }
    .sound-example-pronounce strong { color: #2E6DA4; letter-spacing: 0.04em; }
    .sound-play-btn {
      background: none; border: 1px solid #E0D8C8; border-radius: 6px;
      color: #2E6DA4; font-size: 15px; padding: 4px 10px;
      min-height: 36px; cursor: pointer; flex-shrink: 0;
    }
    .sounds-note {
      font-size: 15px; color: #6B6B6B; line-height: 24px;
      border-left: 3px solid #E0D8C8; padding-left: 10px;
    }

    /* Lesson notes — list */
    .lesson-card {
      background: #FAF3E0; border: 1px solid #E0D8C8; border-radius: 10px;
      padding: 16px; display: flex; flex-direction: column; gap: 6px;
      text-align: left; width: 100%; cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .lesson-card:hover { background: #F0E8D0; border-color: #2E6DA4; }
    .lesson-card-ref { border-left: 4px solid #6B4FA0; }
    .lesson-card-title { font-size: 20px; font-weight: 600; color: #1A1A1A; }
    .lesson-card-date  { font-size: 15px; color: #6B6B6B; }
    .lesson-card-summary { font-size: 16px; color: #1A1A1A; line-height: 26px; }

    /* Lesson notes — detail */
    .lesson-header { display: flex; flex-direction: column; gap: 4px; padding-bottom: 8px; }
    .lesson-detail-date { font-size: 15px; color: #6B6B6B; }
    .lesson-detail-title { font-size: 22px; font-weight: 600; color: #1A1A1A; line-height: 32px; }
    .lesson-detail-summary { font-size: 17px; color: #1A1A1A; line-height: 27px; margin-top: 4px; }
    .lesson-section { display: flex; flex-direction: column; gap: 6px; padding: 8px 0; }
    .lesson-section-heading {
      font-size: 14px; font-weight: 600; color: #6B6B6B;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .lesson-section-body { font-size: 17px; color: #1A1A1A; line-height: 28px; }
    .lesson-section-list {
      font-size: 17px; color: #1A1A1A; line-height: 28px;
      list-style: none; display: flex; flex-direction: column; gap: 6px;
      padding: 0; margin: 0;
    }
    .lesson-section-list li {
      padding-left: 16px; position: relative;
    }
    .lesson-section-list li::before {
      content: "•"; color: #2E6DA4; position: absolute; left: 0; top: 0;
    }
  </style>
</head>

function colorHtml(text) {
  const lower = text.toLowerCase();
  let html = '';
  let i = 0;
  while (i < text.length) {
    let matched = false;
    for (const { p, c } of COLOR_PATTERNS) {
      if (lower.startsWith(p, i)) {
        html += `<span style="color:${c}">${text.slice(i, i + p.length)}</span>`;
        i += p.length;
        matched = true;
        break;
      }
    }
    if (!matched) { html += text[i]; i++; }
  }
  return html;
}

const HINTS = {
  ui: 'ui — start with "ah", round lips tightly toward "oo"',
  eu: 'eu — say "e" in "bed", then round lips without moving tongue',
  ij: 'ij / ei — like "ay" in "say" — hold flat, no glide',
  ei: 'ij / ei — like "ay" in "say" — hold flat, no glide',
  oe: 'oe — like "oo" in "food" — pure sound, no glide',
  ch: 'ch / g — raspy throat sound, like clearing your throat',
  uu: 'uu ★ — say "ee" then round your lips tightly',
  aa: 'aa — like "a" in "father" held longer',
  oo: 'oo — like "o" in "so" — hold flat, do not glide',
  ee: 'ee — like "ay" in "say" — hold flat, do not glide',
};

function getHint(dutch) {
  const lower = dutch.toLowerCase();
  for (const [sound, hint] of Object.entries(HINTS)) {
    if (lower.includes(sound)) return hint;
  }
  return null;
}

// ============================================================
// SPEECH
// ============================================================
function speak(text, slow) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'nl-NL';
  utt.rate = slow ? 0.75 : 1.0;
  window.speechSynthesis.speak(utt);
}

const K = {
  words: 'nederly_words', sessions: 'nederly_sessions',
  attempts: 'nederly_attempts', categories: 'nederly_categories',
  pairs: 'nederly_minimal_pairs', init: 'nederly_initialized',
};

function load(key) {
  try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return []; }
}
function save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
function nextId(items) { return items.length === 0 ? 1 : Math.max(...items.map(i => i.id)) + 1; }

function initStorage() {
  // Clear and re-seed if the data version changed
  const stored = localStorage.getItem(K.init);
  const VERSION = '4'; // bump this when you add new lesson data above
  if (stored === VERSION) return;

  save(K.categories, CATEGORIES.map((c, i) => ({ id: i + 1, name: c.name })));
  const words = [];
  let wid = 1;
  CATEGORIES.forEach((cat, ci) => {
    cat.words.forEach(w => {
      words.push({ id: wid++, dutch: w.dutch, english: w.english, categoryId: ci + 1, sessionId: null, createdAt: Date.now() });
    });
  });
  save(K.words, words);
  save(K.pairs, MINIMAL_PAIRS.map((p, i) => ({ id: i + 1, ...p })));
  save(K.sessions, []);
  save(K.attempts, []);
  localStorage.setItem(K.init, VERSION);
}

function getCategories() { return load(K.categories); }
function getWordsByCategory(catId) { return load(K.words).filter(w => w.categoryId === catId); }
function getWordsByIds(ids) {
  const all = load(K.words);
  return ids.map(id => all.find(w => w.id === id)).filter(Boolean);
}
function getAllMinimalPairs() { return load(K.pairs); }

function createSession(wordCount, exerciseType) {
  const sessions = load(K.sessions);
  const id = nextId(sessions);
  sessions.push({ id, createdAt: Date.now(), wordCount, exerciseType });
  save(K.sessions, sessions);
  return id;
}

function recordAttempt(sessionId, wordId, exerciseType, outcome) {
  const attempts = load(K.attempts);
  attempts.push({ id: nextId(attempts), sessionId, wordId, exerciseType, outcome, createdAt: Date.now() });
  save(K.attempts, attempts);
}

function getSessionOutcomes(sessionId) {
  const attempts = load(K.attempts).filter(a => a.sessionId === sessionId);
  return {
    correct: attempts.filter(a => a.outcome === 'correct').length,
    incorrect: attempts.filter(a => a.outcome === 'incorrect').length,
    skipped: attempts.filter(a => a.outcome === 'skipped').length,
  };
}

function getSessionStats() {
  const attempts = load(K.attempts);
  return { sessionCount: load(K.sessions).length, wordCount: new Set(attempts.map(a => a.wordId)).size };
}

function getRecentSessions(limit) {
  return load(K.sessions).sort((a, b) => b.createdAt - a.createdAt).slice(0, limit || 10);
}

function insertPastedWords(lines, sessionId) {
  const words = load(K.words);
  const ids = [];
  let id = nextId(words);
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    const parts = trimmed.split(/[-–—]/);
    const dutch = parts[0].trim();
    const english = parts.length > 1 ? parts.slice(1).join('-').trim() : '';
    words.push({ id, dutch, english, categoryId: null, sessionId, createdAt: Date.now() });
    ids.push(id++);
  }
  save(K.words, words);
  return ids;
}

// ============================================================
// STATE
// ============================================================
let S = {
  stack: [{ screen: 'Home' }],
  // session
  sessionWords: [],
  sessionIndex: 0,
  sessionRevealed: false,
  sessionId: null,
  sessionExerciseType: 'flashcard',
  // add vocab
  pasteText: '',
  exerciseType: 'flashcard',
  // minimal pairs
  pairs: [],
  pairIndex: 0,
  pairTarget: 'a',
  pairStateA: 'default',
  pairStateB: 'default',
  pairDone: false,
  // session category name (for mastery card)
  sessionCategoryName: null,
  // sound card expansion state
  soundExpanded: {},
  // lesson notes
  selectedLessonId: null,
};

function currentScreen() { return S.stack[S.stack.length - 1].screen; }
function canGoBack() { return S.stack.length > 1; }

function navigate(screen) {
  S.stack.push({ screen });
  if (screen === 'MinimalPairs') {
    S.pairs = getAllMinimalPairs();
    S.pairIndex = 0;
    S.pairTarget = Math.random() < 0.5 ? 'a' : 'b';
    S.pairStateA = 'default';
    S.pairStateB = 'default';
    S.pairDone = false;
  }
  render();
}

function replace(screen) {
  S.stack[S.stack.length - 1] = { screen };
  render();
}

function goBack() {
  if (S.stack.length > 1) S.stack.pop();
  render();
}

// ============================================================
// DOTS HELPER
// ============================================================
function dotsHtml(total, current) {
  return '<div class="dots">' +
    Array.from({ length: total }, (_, i) => {
      const cls = i < current ? 'done' : i === current ? 'active' : '';
      return `<span class="dot ${cls}"></span>`;
    }).join('') +
    '</div>';
}

function homeHtml() {
  return `
    <div class="screen">
      <p style="font-size:18px">What do you want to practise?</p>
      <div style="display:flex;flex-direction:column;gap:16px">
        <button class="nav-btn" data-action="navigate" data-screen="AddVocab">Paste your vocab</button>
        <button class="nav-btn" data-action="navigate" data-screen="Categories">Browse categories</button>
        <button class="nav-btn" data-action="navigate" data-screen="MinimalPairs">Minimal pair drill</button>
        <button class="nav-btn" data-action="navigate" data-screen="Sounds">Sound guide</button>
        <button class="nav-btn" data-action="navigate" data-screen="LessonsList">Lesson notes</button>
      </div>
      <button class="text-btn" data-action="navigate" data-screen="Progress">View progress</button>
    </div>`;
}

function addVocabHtml() {
  const lines = S.pasteText.split('\n').filter(l => l.trim().length > 0).slice(0, 20);
  const count = lines.length;
  const countHtml = count > 0 ? `<p class="word-count">${count} word${count !== 1 ? 's' : ''} ready</p>` : '';
  return `
    <div class="screen">
      <p style="font-size:18px">Paste one word or phrase per line:</p>
      <textarea id="paste-input" class="paste-area" rows="7"
        placeholder="goedemorgen\ndank je wel\ntot ziens">${S.pasteText}</textarea>
      ${countHtml}
      <p style="font-size:18px">Exercise type:</p>
      <div style="display:flex;flex-direction:column;gap:0">
        <button class="radio-btn" data-action="set-exercise" data-type="flashcard">
          <span class="radio-circle ${S.exerciseType === 'flashcard' ? 'selected' : ''}"></span>Flashcard
        </button>
        <button class="radio-btn" data-action="set-exercise" data-type="listen_and_repeat">
          <span class="radio-circle ${S.exerciseType === 'listen_and_repeat' ? 'selected' : ''}"></span>Listen &amp; repeat
        </button>
      </div>
      <button class="start-btn" data-action="start-session" ${count === 0 ? 'disabled' : ''}>
        Start Practice
      </button>
    </div>`;
}

function categoriesHtml() {
  const cats = getCategories();
  return `
    <div class="screen">
      ${cats.map(cat => `
        <button class="nav-btn" data-action="select-category" data-id="${cat.id}">
          ${cat.name}
        </button>`).join('')}
    </div>`;
}

function sessionHtml() {
  const words = S.sessionWords;
  if (!words.length) return '<div class="screen"><p>No words.</p></div>';
  const word = words[S.sessionIndex];
  const revealed = S.sessionRevealed;
  const hint = revealed ? getHint(word.dutch) : null;
  const hintHtml = hint ? `<div class="hint">${hint}</div>` : '';
  const revealedContent = revealed ? `
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <span class="card-english">${word.english || '—'}</span>
    </div>` : `<span class="card-tap">Tap to reveal</span>`;

  const outcomeHtml = revealed ? `
    <div class="outcome-row">
      <button class="missed-btn" data-action="advance" data-outcome="incorrect">✗ Missed it</button>
      <button class="got-btn" data-action="advance" data-outcome="correct">✓ Got it</button>
    </div>` : '';

  const totalWords = words.length;
  const currentPos = Math.min(S.sessionIndex + (revealed ? 1 : 0), totalWords);
  const pctFill = (currentPos / totalWords) * 100;
  return `
    <div class="screen">
      ${dotsHtml(words.length, S.sessionIndex)}
      <div class="progress-row">
        <div class="progress-track">
          <div class="progress-fill" style="width:${pctFill}%"></div>
        </div>
        <span class="progress-label">${currentPos} of ${totalWords}</span>
      </div>
      <div class="card ${revealed ? 'revealed' : ''}" data-action="${revealed ? '' : 'reveal'}">
        <div class="card-word">${colorHtml(word.dutch)}</div>
        <div class="play-row">
          <button class="play-btn" data-action="speak" data-text="${word.dutch}">▶ Play</button>
          ${revealed ? `<button class="play-btn slow" data-action="speak" data-text="${word.dutch}" data-slow="true">▶ Slow</button>` : ''}
        </div>
        ${revealedContent}
      </div>
      ${hintHtml}
      ${outcomeHtml}
    </div>`;
}

function sessionCompleteHtml() {
  const out = getSessionOutcomes(S.sessionId);
  const total = out.correct + out.incorrect + out.skipped;
  const categoryLine = S.sessionCategoryName
    ? `Category: ${S.sessionCategoryName}`
    : 'Pasted vocab';
  const skippedRow = out.skipped > 0 ? `
    <div class="outcome-row-item">
      <span style="color:#6B6B6B;font-size:18px;width:24px;text-align:center">–</span>
      <span style="flex:1;font-size:18px">Skipped</span>
      <strong style="color:#6B6B6B;font-size:18px">${out.skipped}</strong>
    </div>` : '';
  return `
    <div class="complete-screen">
      <h2 style="font-size:20px;font-weight:600">Nice session.</h2>
      <p style="font-size:18px;color:#1A1A1A;margin-top:16px">
        You practiced ${total} word${total !== 1 ? 's' : ''} today.
      </p>
      <p style="font-size:18px;color:#1A1A1A">${categoryLine}</p>
      <div style="width:100%;display:flex;flex-direction:column;gap:8px;margin-top:24px">
        <div class="outcome-row-item">
          <span style="color:#3A7D44;font-size:18px;width:24px;text-align:center">✓</span>
          <span style="flex:1;font-size:18px">Got it</span>
          <strong style="color:#3A7D44;font-size:18px">${out.correct}</strong>
        </div>
        <div class="outcome-row-item">
          <span style="color:#D94F3D;font-size:18px;width:24px;text-align:center">✗</span>
          <span style="flex:1;font-size:18px">Missed</span>
          <strong style="color:#D94F3D;font-size:18px">${out.incorrect}</strong>
        </div>
        ${skippedRow}
      </div>
      <button class="home-btn" data-action="go-home">Back home</button>
    </div>`;
}

function minimalPairsHtml() {
  const pairs = S.pairs;
  if (!pairs.length) return `<div class="screen"><p class="empty-msg">No minimal pairs yet.</p></div>`;
  if (S.pairDone) return `
    <div class="screen" style="align-items:center">
      <p style="font-size:22px">All done!</p>
      <p style="font-size:18px;color:#6B6B6B">Completed all ${pairs.length} pairs.</p>
    </div>`;

  const pair = pairs[S.pairIndex];
  const promptWord = S.pairTarget === 'a' ? pair.word_a : pair.word_b;
  const answered = S.pairStateA !== 'default' || S.pairStateB !== 'default';

  return `
    <div class="screen">
      ${dotsHtml(pairs.length, S.pairIndex)}
      <div style="display:flex;align-items:center;gap:16px">
        <p style="flex:1;font-size:18px">Tap the word you hear:</p>
        <button class="play-btn" data-action="speak" data-text="${promptWord}">▶ Play</button>
      </div>
      <p class="focus-label">Focus: ${pair.tricky_sound}</p>
      <div class="pair-row">
        <div class="pair-card ${S.pairStateA}" data-action="${answered ? '' : 'pick-pair'}" data-choice="a">
          <span class="pair-word-a">${pair.word_a}</span>
          <span class="pair-english">${pair.english_a}</span>
        </div>
        <div class="pair-card ${S.pairStateB}" data-action="${answered ? '' : 'pick-pair'}" data-choice="b">
          <span class="pair-word-b">${pair.word_b}</span>
          <span class="pair-english">${pair.english_b}</span>
        </div>
      </div>
    </div>`;
}

function soundsHtml() {
  // Group by section
  const sections = [];
  const seen = {};
  for (const s of SOUNDS) {
    if (!seen[s.section]) { seen[s.section] = true; sections.push(s.section); }
  }

  const sectionsHtml = sections.map(sec => {
    const items = SOUNDS.filter(s => s.section === sec);
    const cardsHtml = items.map(s => {
      const starHtml = s.star ? `<span class="sound-star">★</span>` : '';
      const key = `${s.section}:${s.sound}`;
      const expanded = !!S.soundExpanded[key];
      const descClass = expanded ? 'sound-desc' : 'sound-desc clamped';
      const toggleLabel = expanded ? 'Show less' : 'Show more';
      return `
        <div class="sound-card">
          <div class="sound-card-top">
            <span class="sound-spelling">${colorHtml(s.sound)}</span>
            ${starHtml}
          </div>
          <p class="${descClass}" data-sound-key="${key}">${s.desc}</p>
          <button class="sound-toggle" data-action="toggle-sound" data-key="${key}">${toggleLabel}</button>
          <div class="sound-example-row">
            <button class="sound-play-btn" data-action="speak" data-text="${s.speakAs}" title="Hear the sound">▶ Sound</button>
            <button class="sound-play-btn" data-action="speak" data-text="${s.example}" title="Hear in a word">▶ ${colorHtml(s.example)}</button>
            <span class="sound-example-english">${s.exEnglish}</span>
          </div>
          <p class="sound-example-pronounce">say: <strong>${s.exPronounce}</strong></p>
        </div>`;
    }).join('');
    return `<p class="sound-section-heading">${sec}</p>${cardsHtml}`;
  }).join('');

  return `
    <div class="screen">
      <p class="sounds-note">★ = no English equivalent — listen carefully and try to copy the sound.</p>
      ${sectionsHtml}
    </div>`;
}

function lessonsListHtml() {
  if (!LESSONS.length) {
    return `<div class="screen"><p class="empty-msg">No lesson notes yet. Add one in the LESSONS array.</p></div>`;
  }
  const cardsHtml = LESSONS.map(l => {
    const isRef = l.kind === 'reference';
    const titleLine = isRef ? l.title : `Lesson ${l.id} — ${l.title}`;
    const dateLine  = isRef ? `Reference · updated ${l.date}` : l.date;
    return `
    <button class="lesson-card${isRef ? ' lesson-card-ref' : ''}" data-action="select-lesson" data-id="${l.id}">
      <span class="lesson-card-title">${titleLine}</span>
      <span class="lesson-card-date">${dateLine}</span>
      <span class="lesson-card-summary">${l.summary}</span>
    </button>`;
  }).join('');
  return `<div class="screen">${cardsHtml}</div>`;
}

function lessonDetailHtml() {
  const lesson = LESSONS.find(l => l.id === S.selectedLessonId);
  if (!lesson) {
    return `<div class="screen"><p class="empty-msg">Lesson not found.</p></div>`;
  }
  const sectionsHtml = lesson.sections.map(sec => {
    let inner;
    if (sec.items && sec.items.length) {
      inner = `<ul class="lesson-section-list">${sec.items.map(i => `<li>${i}</li>`).join('')}</ul>`;
    } else {
      inner = `<p class="lesson-section-body">${(sec.body || '').replace(/\n/g, '<br>')}</p>`;
    }
    return `
    <div class="lesson-section">
      <h3 class="lesson-section-heading">${sec.heading}</h3>
      ${inner}
    </div>`;
  }).join('');
  const isRef = lesson.kind === 'reference';
  const titleLine = isRef ? lesson.title : `Lesson ${lesson.id} — ${lesson.title}`;
  const dateLine  = isRef ? `Reference · updated ${lesson.date}` : lesson.date;
  return `
    <div class="screen">
      <div class="lesson-header">
        <span class="lesson-detail-date">${dateLine}</span>
        <h2 class="lesson-detail-title">${titleLine}</h2>
        <p class="lesson-detail-summary">${lesson.summary}</p>
      </div>
      ${sectionsHtml}
    </div>`;
}

function progressHtml() {
  const stats = getSessionStats();
  const sessions = getRecentSessions(10);
  const sessionRows = sessions.length === 0
    ? `<p class="empty-msg">No sessions yet. Start practising!</p>`
    : `<p class="section-label">Recent sessions</p>` +
      sessions.map(s => {
        const d = new Date(s.createdAt);
        const date = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        const time = d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
        const type = s.exerciseType === 'flashcard' ? 'Flashcard' : 'Listen & repeat';
        return `
          <div class="session-row">
            <div class="session-info">
              <span class="session-date">${date} ${time}</span>
              <span class="session-type">${type}</span>
            </div>
            <span class="session-count">${s.wordCount} words</span>
          </div>`;
      }).join('');

  return `
    <div class="screen">
      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-num">${stats.sessionCount}</span>
          <span class="stat-label">sessions</span>
        </div>
        <div class="stat-box">
          <span class="stat-num">${stats.wordCount}</span>
          <span class="stat-label">words practiced</span>
        </div>
      </div>
      ${sessionRows}
    </div>`;
}

// RENDER
// ============================================================
const TITLES = {
  Home: 'Nederly', AddVocab: "Add today's words",
  Categories: 'Choose a category', Session: 'Practice',
  MinimalPairs: 'Minimal pairs', Progress: 'Progress',
  Sounds: 'Sound guide',
  LessonsList: 'Lesson notes', LessonDetail: 'Lesson',
};

function render() {
  const screen = currentScreen();
  const showHeader = screen !== 'SessionComplete';
  const back = canGoBack() && screen !== 'SessionComplete'
    ? `<button class="back-btn" data-action="back">←</button>` : '';

  const header = showHeader
    ? `<header class="header">${back}<h1>${TITLES[screen] || ''}</h1></header>`
    : '';

  let body = '';
  if (screen === 'Home')            body = homeHtml();
  else if (screen === 'AddVocab')   body = addVocabHtml();
  else if (screen === 'Categories') body = categoriesHtml();
  else if (screen === 'Session')    body = sessionHtml();
  else if (screen === 'SessionComplete') body = sessionCompleteHtml();
  else if (screen === 'MinimalPairs')    body = minimalPairsHtml();
  else if (screen === 'Progress')        body = progressHtml();
  else if (screen === 'Sounds')          body = soundsHtml();
  else if (screen === 'LessonsList')     body = lessonsListHtml();
  else if (screen === 'LessonDetail')    body = lessonDetailHtml();

  document.getElementById('app').innerHTML = header + `<main style="flex:1">${body}</main>`;

  // Restore textarea value without losing cursor
  const ta = document.getElementById('paste-input');
  if (ta) ta.value = S.pasteText;

  // Hide "Show more" on sound cards that don't actually overflow
  if (currentScreen() === 'Sounds') {
    requestAnimationFrame(() => {
      document.querySelectorAll('.sound-desc.clamped').forEach(el => {
        if (el.scrollHeight <= el.clientHeight + 1) {
          const key = el.dataset.soundKey;
          const toggle = document.querySelector(`.sound-toggle[data-key="${key}"]`);
          if (toggle) toggle.style.display = 'none';
        }
      });
    });
  }
}

// ============================================================
// EVENTS
// ============================================================
document.addEventListener('click', function(e) {
  // Stop play buttons from triggering the card reveal
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  if (!action) return;

  if (action === 'speak') {
    e.stopPropagation();
    speak(btn.dataset.text, btn.dataset.slow === 'true');
    return;
  }

  if (action === 'back') { goBack(); return; }
  if (action === 'go-home') { S.stack = [{ screen: 'Home' }]; render(); return; }
  if (action === 'navigate') { navigate(btn.dataset.screen); return; }

  if (action === 'set-exercise') {
    S.exerciseType = btn.dataset.type;
    render();
    return;
  }

  if (action === 'start-session') {
    const lines = S.pasteText.split('\n').filter(l => l.trim().length > 0).slice(0, 20);
    if (!lines.length) return;
    const sessionId = createSession(lines.length, S.exerciseType);
    const wordIds = insertPastedWords(lines, sessionId);
    S.sessionWords = getWordsByIds(wordIds);
    S.sessionIndex = 0;
    S.sessionRevealed = false;
    S.sessionId = sessionId;
    S.sessionExerciseType = S.exerciseType;
    S.sessionCategoryName = null;
    S.pasteText = '';
    replace('Session');
    return;
  }

  if (action === 'select-category') {
    const catId = parseInt(btn.dataset.id);
    const words = getWordsByCategory(catId);
    if (!words.length) return;
    const cat = getCategories().find(c => c.id === catId);
    S.sessionCategoryName = cat ? cat.name : null;
    const sessionId = createSession(words.length, 'flashcard');
    S.sessionWords = words;
    S.sessionIndex = 0;
    S.sessionRevealed = false;
    S.sessionId = sessionId;
    S.sessionExerciseType = 'flashcard';
    navigate('Session');
    return;
  }

  if (action === 'select-lesson') {
    S.selectedLessonId = parseInt(btn.dataset.id);
    navigate('LessonDetail');
    return;
  }

  if (action === 'toggle-sound') {
    const key = btn.dataset.key;
    S.soundExpanded[key] = !S.soundExpanded[key];
    render();
    return;
  }

  if (action === 'reveal') {
    S.sessionRevealed = true;
    render();
    return;
  }

  if (action === 'advance') {
    const outcome = btn.dataset.outcome;
    recordAttempt(S.sessionId, S.sessionWords[S.sessionIndex].id, S.sessionExerciseType, outcome);
    const next = S.sessionIndex + 1;
    if (next >= S.sessionWords.length) {
      replace('SessionComplete');
    } else {
      S.sessionIndex = next;
      S.sessionRevealed = false;
      render();
    }
    return;
  }

  if (action === 'pick-pair') {
    const choice = btn.dataset.choice;
    const correct = choice === S.pairTarget;
    S.pairStateA = choice === 'a' ? (correct ? 'correct' : 'incorrect') : (correct ? 'default' : 'correct');
    S.pairStateB = choice === 'b' ? (correct ? 'correct' : 'incorrect') : (correct ? 'default' : 'correct');
    render();
    setTimeout(() => {
      const next = S.pairIndex + 1;
      if (next >= S.pairs.length) { S.pairDone = true; render(); return; }
      S.pairIndex = next;
      S.pairTarget = Math.random() < 0.5 ? 'a' : 'b';
      S.pairStateA = 'default';
      S.pairStateB = 'default';
      render();
    }, 900);
    return;
  }
});

document.addEventListener('input', function(e) {
  if (e.target && e.target.id === 'paste-input') {
    S.pasteText = e.target.value;
    // Update word count without full re-render (avoids cursor jump)
    const lines = S.pasteText.split('\n').filter(l => l.trim().length > 0).slice(0, 20);
    const countEl = document.querySelector('.word-count');
    if (countEl) {
      countEl.textContent = lines.length > 0 ? `${lines.length} word${lines.length !== 1 ? 's' : ''} ready` : '';
    }
    const startBtn = document.querySelector('.start-btn');
    if (startBtn) startBtn.disabled = lines.length === 0;
  }
});

// ============================================================
// INIT
// ============================================================
initStorage();
render();
</script>
</body>
</html>
